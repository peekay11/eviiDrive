services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000" # Changed back to standard backend port

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80" # This maps your computer's 8080 to Nginx's 80
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend